name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SOLANA_VERSION: v3.1.10

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked

  sbf:
    name: SBF build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-sbf-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-sbf-${{ runner.os }}-

      - name: Install Agave CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          solana --version
          cargo build-sbf --version

      - name: Build SBF program
        run: cargo build-sbf -- --locked

      - name: Check SBF symbols
        run: bash scripts/check-sbf-symbols.sh target/deploy/secp256k1.so

      - name: Upload SBF artifact
        uses: actions/upload-artifact@v4
        with:
          name: secp256k1-sbf
          path: target/deploy/secp256k1.so
          if-no-files-found: error
